server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (применяются ко всем ответам, включая HTML)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # CSP: фронт билдится Vite, JS — отдельным bundle, но в App.jsx есть inline <style>.
    # script-src без 'unsafe-inline' — блокирует любой инлайн-JS (XSS).
    # style-src 'unsafe-inline' — нужен из-за inline-стилей в App.jsx (TODO: вынести в .css).
    # img-src data: — для QR-кодов (base64 data URI).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API to backend
    location /api/ {
        proxy_pass http://backend:3001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # FLClash subscriptions — публичный endpoint, без авторизации
    # URL для FLClash: http://<VPS_IP>:8080/sub/<slug>
    location /sub/ {
        proxy_pass http://backend:3001/sub/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;

        # Заголовки чтобы FLClash и другие клиенты правильно распознали YAML
        proxy_hide_header Content-Disposition;
        # CSP на YAML-подписке не нужен — переопределяем
        add_header Content-Security-Policy "" always;
        add_header Content-Type "text/plain; charset=utf-8";
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }
}
