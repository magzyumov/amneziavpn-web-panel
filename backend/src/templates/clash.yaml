proxy-groups:
  - name: "🚫 Недоступные сайты"
    type: select
    proxies:
      - PROXY_NAME_PLACEHOLDER
      - DIRECT
  - name: "➤ Telegram"
    type: select
    proxies:
      - "🚫 Недоступные сайты"
      - DIRECT
  - name: "➤ Whatsapp"
    type: select
    proxies:
      - "🚫 Недоступные сайты"
      - DIRECT
  - name: "🟠 Cloudflare"
    type: select
    proxies:
      - DIRECT
      - "🚫 Недоступные сайты"
  - name: "⚪🔵🔴 RU сайты"
    type: select
    proxies:
      - DIRECT
  - name: "🌍 Остальные сайты"
    type: select
    proxies:
      - DIRECT
      - "🚫 Недоступные сайты"

# PROXIES_PLACEHOLDER

mixed-port: 7890
allow-lan: true
tcp-concurrent: true
find-process-mode: always
mode: rule
log-level: info
ipv6: false
keep-alive-interval: 30
unified-delay: false

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: false
  sniff:
    HTTP:
      ports:
        - 80
        - 8080-8880
      override-destination: true
    TLS:
      ports:
        - 443
        - 8443

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-filter:
    - "*.alfabank.ru"
    - "*.local"
  default-nameserver:
    - 1.1.1.1
    - 8.8.8.8
  proxy-server-nameserver:
    - tls://1.1.1.1
    - https://8.8.8.8/dns-query
  nameserver:
    - tls://94.140.14.14
    - tls://94.140.15.15
  direct-nameserver:
    - 77.88.8.8
    - 8.8.8.8
  nameserver-policy:
    "*.alfabank.ru":
      - 10.226.0.5
    "rule-set:geosite-ru":
      - 77.88.8.8
      - 8.8.8.8
    "raw.githubusercontent.com,cdn.jsdelivr.net,github.com":
      - 77.88.8.8
      - 8.8.8.8

