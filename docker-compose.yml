services:

  backend:
    build: ./backend
    container_name: amnezia-panel-backend
    restart: unless-stopped
    environment:
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET}
      PANEL_ENCRYPTION_KEY: ${PANEL_ENCRYPTION_KEY:-}
      DB_PATH: /data/panel.db
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - panel

  frontend:
    build: ./frontend
    container_name: amnezia-panel-frontend
    restart: unless-stopped
    ports:
      # Панель:       http://<VPS>:${PANEL_PORT}/
      # Подписки:     http://<VPS>:${PANEL_PORT}/sub/<slug>
      - "${PANEL_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - panel

networks:
  panel:
    driver: bridge
